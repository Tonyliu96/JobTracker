# Spring Boot application properties for development. 
# Database (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (use env JWT_SECRET in production; must be at least 256 bits / 32 chars for HS256)
jwt.secret=${JWT_SECRET}


# Google OAuth (create OAuth 2.0 Client ID at https://console.cloud.google.com/apis/credentials)
google.client-id=${GOOGLE_CLIENT_ID}
